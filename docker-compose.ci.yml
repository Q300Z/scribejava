x-base-config: &base_config
  build:
    context: .
    dockerfile: Dockerfile.ci
    args:
      JAVA_VERSION: 17
      USER_ID: ${USER_ID:-1000}
      GROUP_ID: ${GID:-1000}
  volumes:
    - .:/app
    - maven-cache:/home/scribeuser/.m2
    # On masque les dossiers target de l'hôte pour éviter les conflits de permission
    - /app/target
    - /app/scribejava-core/target
    - /app/scribejava-apis/target
    - /app/scribejava-httpclient-armeria/target
    - /app/scribejava-httpclient-okhttp/target
    - /app/scribejava-oauth1/target
    - /app/scribejava-oidc/target
    - /app/scribejava-integration-helpers/target

x-test-volumes: &test_volumes
  <<: *base_config

services:
  setup:
    <<: *base_config
    command: install -DskipTests -Dmaven.javadoc.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true -Dspotless.check.skip=true

  lint:
    <<: *test_volumes
    command: checkstyle:check pmd:check spotless:check license:check

  test-jdk8:
    <<: *test_volumes
    build:
      context: .
      dockerfile: Dockerfile.ci
      args:
        JAVA_VERSION: 8
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GID:-1000}
    command: install -Dmaven.javadoc.skip=true -Dcheckstyle.skip -Dpmd.skip -Dspotless.check.skip

  test-jdk11:
    <<: *test_volumes
    build:
      context: .
      dockerfile: Dockerfile.ci
      args:
        JAVA_VERSION: 11
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GID:-1000}
    command: install -Dmaven.javadoc.skip=true -Dcheckstyle.skip -Dpmd.skip -Dspotless.check.skip

  test-jdk17:
    <<: *test_volumes
    command: install -Dmaven.javadoc.skip=true -Dcheckstyle.skip -Dpmd.skip -Dspotless.check.skip

  test-jdk21:
    <<: *test_volumes
    build:
      context: .
      dockerfile: Dockerfile.ci
      args:
        JAVA_VERSION: 21
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GID:-1000}
    command: install -Dmaven.javadoc.skip=true -Dcheckstyle.skip -Dpmd.skip -Dspotless.check.skip

  test-jdk25:
    <<: *test_volumes
    build:
      context: .
      dockerfile: Dockerfile.ci
      args:
        JAVA_VERSION: 25
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GID:-1000}
    command: install -Dmaven.javadoc.skip=true -Dcheckstyle.skip -Dpmd.skip -Dspotless.check.skip

  docs:
    <<: *test_volumes
    volumes:
      - .:/app
      - maven-cache:/home/scribeuser/.m2
      - /app/target
      - /app/scribejava-core/target
      - /app/scribejava-apis/target
      - /app/scribejava-httpclient-armeria/target
      - /app/scribejava-httpclient-okhttp/target
      - /app/scribejava-oauth1/target
      - /app/scribejava-oidc/target
      - /app/scribejava-integration-helpers/target
      - docs-data:/app/target/site/apidocs
    command: javadoc:aggregate -Dmaven.javadoc.skip=false -Dcheckstyle.skip -Dpmd.skip -Dspotless.check.skip

volumes:
  maven-cache:
  docs-data:
