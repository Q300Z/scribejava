site_name: ScribeJava
site_description: La bibliothèque OAuth simple et robuste pour Java et Android
site_url: https://q300z.github.io/scribejava/
repo_url: https://github.com/Q300Z/scribejava
repo_name: Q300Z/scribejava

theme:
  name: material
  language: fr
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Passer au mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Passer au mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables

nav:
  - Accueil: index.md
  - Tutoriels (Apprendre):
      - "Démarrage Rapide": tutorials/quickstart.md
  - Guides Pratiques (Résoudre):
      - "Rafraîchissement automatique de Jetons": how-to/auto-refresh-tokens.md
      - "Sécurisation avec PKCE et DPoP": how-to/secure-with-dpop-pkce.md
      - "Durcissement de Sécurité (Production)": how-to/security-hardening.md
      - "Ajouter un Fournisseur Personnalisé": how-to/add-custom-provider.md
      - "Intégration Android": how-to/integrate-android.md
      - "Guide de Dépannage": how-to/troubleshoot-ssl.md
      - "Guide de Migration": how-to/migration-guide.md
  - Explications & Architecture (Comprendre):
      - "Philosophie & Architecture": explanations/core-features.md
      - "Protocoles OIDC Supportés": explanations/oidc-features.md
      - "Fonctionnement des Flux OAuth2/OIDC": explanations/oauth2-flows.md
      - "CI/CD & Pipelines de Qualité": explanations/ci-cd-pipelines.md
      - "Processus de Publication": explanations/release-process.md
  - Références & Spécifications:
      - "Catalogue des Fonctionnalités": reference/features-catalog.md
      - "API Javadoc": https://q300z.github.io/scribejava/apidocs/
  - Décisions d'Architecture (ADR):
      - "ADR 001 : Zéro Dépendance Externe": adr/001-zero-dependency.md
      - "ADR 002 : Compatibilité JDK 8": adr/002-jdk8-compatibility.md
