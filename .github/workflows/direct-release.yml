name: Direct Release (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11' # JDK 11 pour le packaging stable
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 1. Analyse (Calculate Bump)
        id: bump
        run: |
          npm install -g conventional-recommended-bump semver conventional-changelog-angular
          CURRENT_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          BUMP_TYPE=$(conventional-recommended-bump -p angular)
          NEW_VER=$(semver $CURRENT_VER -i $BUMP_TYPE)
          echo "new_version=$NEW_VER" >> $GITHUB_OUTPUT

      - name: 2. Update (Maven Version Set)
        run: |
          NEW_VER=${{ steps.bump.outputs.new_version }}
          mvn versions:set -DnewVersion=$NEW_VER -DgenerateBackupPoms=false
          mvn versions:commit

      - name: 3. Build & Package (Generate JARs with Javadoc)
        run: |
          # On compile tout et on génère les JARs incluant la Javadoc
          mvn clean package -DskipTests -Dmaven.javadoc.skip=false
          mkdir dist
          # On collecte tous les JARs finaux (en excluant les classes de test)
          find . -name "*.jar" -not -path "*/target/test-classes/*" -not -path "*/target/classes/*" -exec cp {} dist/ \;
          # Nettoyage des JARs temporaires si nécessaire
          rm -f dist/original-*.jar

      - name: 4. Changelog (Generate)
        run: |
          npm install -g conventional-changelog-cli conventional-changelog-angular
          conventional-changelog -p angular -i CHANGELOG.md -s -r 0

      - name: 5. Tag & Push
        run: |
          NEW_VER=${{ steps.bump.outputs.new_version }}
          git add .
          git commit -m "chore(release): $NEW_VER [skip ci]"
          git tag -a v$NEW_VER -m "Release v$NEW_VER"
          git push origin master --tags

      - name: 6. GitHub Release (with Assets)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VER=${{ steps.bump.outputs.new_version }}
          # Extraction des notes de release
          sed -n '/^#/,/^#/p' CHANGELOG.md | sed '1d;$d' > release_notes.txt
          # Création de la release avec TOUS les JARs du dossier dist/
          gh release create v$NEW_VER dist/*.jar --title "v$NEW_VER" --notes-file release_notes.txt
