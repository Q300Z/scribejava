name: Direct Release

on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump
        id: bump
        run: |
          npm install -g conventional-recommended-bump semver conventional-changelog-angular
          CURRENT_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          BUMP_TYPE=$(conventional-recommended-bump -p angular)
          NEW_VER=$(semver $CURRENT_VER -i $BUMP_TYPE)
          echo "new_version=$NEW_VER" >> $GITHUB_OUTPUT

      - name: Version
        run: |
          NEW_VER=${{ steps.bump.outputs.new_version }}
          mvn versions:set -DnewVersion=$NEW_VER -DgenerateBackupPoms=false
          mvn versions:commit

      - name: Build
        run: |
          mvn clean package -DskipTests
          mkdir dist
          cp scribejava-core/target/*.jar dist/ 2>/dev/null || true
          cp scribejava-oidc/target/*.jar dist/ 2>/dev/null || true
          cp scribejava-apis/target/*.jar dist/ 2>/dev/null || true
          cp scribejava-oauth1/target/*.jar dist/ 2>/dev/null || true
          cp scribejava-httpclient-okhttp/target/*.jar dist/ 2>/dev/null || true
          cp scribejava-httpclient-armeria/target/*.jar dist/ 2>/dev/null || true
          cp scribejava-integration-helpers/target/*.jar dist/ 2>/dev/null || true
          rm -f dist/*-sources.jar dist/*-tests.jar dist/original-*.jar

      - name: Changelog
        run: |
          npm install -g conventional-changelog-cli conventional-changelog-angular
          conventional-changelog -p angular -i CHANGELOG.md -s -r 0
          conventional-changelog -p angular -r 1 > release_notes.txt

      - name: Push
        run: |
          NEW_VER=${{ steps.bump.outputs.new_version }}
          git add .
          git commit -m "chore(release): $NEW_VER [skip ci]"
          git tag -a v$NEW_VER -m "Release v$NEW_VER"
          git push origin master --tags

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VER=${{ steps.bump.outputs.new_version }}
          gh release create v$NEW_VER dist/*.jar --title "v$NEW_VER" --notes-file release_notes.txt
