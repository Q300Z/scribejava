name: Deploy Javadoc to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install artifacts
        run: mvn install -DskipTests -Dmaven.javadoc.skip=true

      - name: Generate Javadoc
        run: mvn javadoc:aggregate -DskipTests -Dmaven.javadoc.skip=false -DadditionalJOption=-Xdoclint:none -DadditionalJOption=-Xdoclint:none

      - name: Deploy Javadoc
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/apidocs
          destination_dir: docs
          commit_message: "docs: update javadoc [skip ci]"
