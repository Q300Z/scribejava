name: Create GitHub Release

on:
  push:
    tags:
      - 'v*' # Déclenché lors du push d'un tag commençant par 'v' (ex: v9.0.0)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour créer la release et uploader les assets

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Récupère tout l'historique pour le changelog

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests -Dmaven.javadoc.skip=true

    - name: Collect Artifacts
      run: |
        mkdir dist
        find . -name "*.jar" -not -path "*/target/test-classes/*" -not -path "*/target/classes/*" -exec cp {} dist/ \;
        # On ne garde que les JARs finaux (pas les original-*.jar si présents)
        rm -f dist/original-*.jar

    - name: Generate Changelog
      run: |
        # Extrait la section du CHANGELOG.md correspondant à la version actuelle
        # Ou utilise un outil comme 'git-cliff' ou 'conventional-changelog'
        echo "Release automatique de la version ${{ github.ref_name }}" > release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.jar
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
