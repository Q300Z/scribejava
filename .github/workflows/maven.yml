name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '8', '11', '17', '21', '25' ]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Static Analysis (Checkstyle)
      run: mvn checkstyle:check -pl scribejava-core,scribejava-oidc,scribejava-oauth1

    - name: Build and Test
      run: mvn test -T 1C -Dmaven.javadoc.skip=true

    - name: PMD Analysis
      if: matrix.java == '17'
      run: mvn pmd:check -pl scribejava-core,scribejava-oidc,scribejava-oauth1

    - name: Mutation Testing (PITest)
      if: github.event_name == 'pull_request' && matrix.java == '17'
      run: mvn pitest:mutationCoverage -pl scribejava-core,scribejava-oidc
