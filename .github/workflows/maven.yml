name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # Étape 1 : Compilation et Analyse sous JDK 8
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'maven' # ACTIVE LE CACHE POUR LES DEPENDANCES MAVEN

    - name: Build, Install and Static Analysis
      run: mvn clean install -DskipTests -Dmaven.javadoc.skip=true checkstyle:check pmd:check

    - name: Upload compiled artifacts
      uses: actions/upload-artifact@v3
      with:
        name: compiled-jars
        path: "**/target/*.jar"

  # Étape 2 : Matrice de tests sur tous les JDK
  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '8', '11', '17', '21', '25' ]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'maven' # ACTIVE LE CACHE AUSSI POUR LES JOBS DE TEST

    - name: Download compiled artifacts
      uses: actions/download-artifact@v3
      with:
        name: compiled-jars

    - name: Run Tests
      # On relance mvn install car les tests des modules apis/oidc ont besoin des JARs de core installés dans le .m2
      run: mvn install -Dmaven.javadoc.skip=true

    - name: Mutation Testing (PITest)
      if: github.event_name == 'pull_request' && matrix.java == '17'
      run: mvn pitest:mutationCoverage -pl scribejava-core,scribejava-oidc
