name: Java CI with Maven

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Job 1: Static Analysis and Linting
  lint:
    name: Static Analysis (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
      - name: Install dependencies
        run: mvn install -DskipTests -Dmaven.javadoc.skip=true -Dcheckstyle.skip -Dpmd.skip -Dspotless.check -Dlicense.skip
      - name: Run Linters
        run: mvn spotless:check checkstyle:check pmd:check license:check

  # Job 2: Documentation Audit
  lint-docs:
    name: Documentation Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown Lint
        uses: davidanson/markdownlint-cli2-action@v16
        with:
          globs: |
            docs/*.md
            README.md
      - name: Link Checker
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          args: --verbose --no-progress "docs/*.md" "README.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Multi-JDK Build & Test Matrix
  test:
    name: Build & Test (JDK ${{ matrix.java }})
    needs: [lint, lint-docs]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["8", "11", "17", "21", "25"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"
          cache: "maven"
      
      - name: Build and Test
        run: mvn clean install -Dmaven.javadoc.skip=true -Dcheckstyle.skip -Dpmd.skip -Dspotless.check.skip
      
      # Archivage des JARs uniquement pour JDK 8 (version de production)
      - name: Upload Release Artifacts (JDK 8 only)
        if: matrix.java == '8'
        uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: "**/target/*.jar"
          retention-days: 5

  # Job 4: Javadoc Deployment (Success on master push or tags)
  deploy-docs:
    name: Deploy Javadoc
    needs: test
    if: |
      (github.ref == 'refs/heads/master' && github.event_name == 'push') ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: "maven"
      - name: Generate Javadoc
        run: |
          mvn install -DskipTests -Dmaven.javadoc.skip=true
          mvn javadoc:aggregate -DskipTests -Dmaven.javadoc.skip=false
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/apidocs
          destination_dir: docs
          commit_message: "docs: update javadoc [skip ci]"

  # Job 5: Release (Success on master with specific commit message or dispatch)
  publish-release:
    name: Publish Release
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master' && startsWith(github.event.head_commit.message, 'chore(release):')) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: artifacts

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
      
      - name: Publish to GitHub via release-it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm add -g release-it @release-it/conventional-changelog
          # La config des assets est maintenant dans .release-it.json
          pnpm exec release-it --ci --no-git --github.release
