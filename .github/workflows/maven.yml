name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # Étape 1 : Analyse statique et Lintage sous JDK 17
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: mvn install jar:test-jar -DskipTests -Dmaven.javadoc.skip=true -Dcheckstyle.skip -Dpmd.skip -Dspotless.check -Dlicense.skip

      - name: Static Analysis (Checkstyle, PMD, Spotless, License)
        run: mvn checkstyle:check pmd:check spotless:check license:check

  # Étape 2 : Compilation sous JDK 8 et packaging des tests
  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Install
        run: mvn clean install -DskipTests -Dmaven.javadoc.skip=true

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-jars
          path: "**/target/*.jar"

  # Étape 3 : Matrice de tests sur tous les JDK
  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '8', '11', '17', '21', '25' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Download compiled artifacts
        uses: actions/download-artifact@v4
        with:
          name: compiled-jars

      - name: Run Tests
        # On utilise test car les artefacts sont déjà dans le réacteur ou téléchargés
        run: mvn test -Dmaven.javadoc.skip=true -Dcheckstyle.skip -Dpmd.skip -Dspotless.check.skip

      - name: Mutation Testing (PITest)
        if: github.event_name == 'pull_request' && matrix.java == '17'
        run: mvn pitest:mutationCoverage -pl scribejava-core,scribejava-oidc
