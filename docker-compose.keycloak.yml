version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:20.0.5
    ports:
      - "8081:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./scribejava-keycloak-realm.json:/opt/keycloak/data/import/realm.json
    command: start-dev --import-realm
